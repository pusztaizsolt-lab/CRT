# CRT Ajánlatsegéd – Nginx konfiguráció (standalone sablon)
# Elhelyezés: /etc/nginx/sites-available/crt
# Symlink: ln -sf /etc/nginx/sites-available/crt /etc/nginx/sites-enabled/crt
# rm -f /etc/nginx/sites-enabled/default
#
# WSL2 telepítéskor a build_wsl.sh automatikusan behelyettesíti a __CRT_DIR__ értékét.
# Kézi telepítésnél cseréld le a __CRT_DIR__ szöveget a CRT mappa WSL2 elérési útjára,
# például: /mnt/h/Saját meghajtó/CRT   (H: meghajtó esetén)

upstream crt_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;

    # UI statikus fájlok
    root __CRT_DIR__/ui;
    index login.html;

    # Gzip tömörítés
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Feltöltési méretkorlát (xlsx/pdf/docx fájlok)
    client_max_body_size 25M;

    # Alap biztonsági fejlécek
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # Statikus UI fájlok kiszolgálása
    location / {
        try_files $uri $uri/ /login.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # API proxy – /api/ prefix alatt (jövőbeli igény esetén)
    # A jelenlegi UI közvetlenül localhost:8000-re hív, de az alábbi blokk
    # lehetővé teszi a zérót érintő áttelepítést ha az API_BASE megváltozik.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://crt_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        client_max_body_size 25M;
    }

    # Naplók
    access_log __CRT_DIR__/logs/nginx/access.log;
    error_log  __CRT_DIR__/logs/nginx/error.log warn;
}
